<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYPO WEBTOON · 뷰어</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --blue:#3182F6;--blue-dark:#1B64DA;--blue-soft:#E8F2FF;--bg:#F2F4F6;--card:#FFFFFF;
  --line:#EAECEF;--text:#191F28;--text-sub:#4E5968;--text-mute:#8B95A1;--header-bg:#E9EEF4;
  --shadow:0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard','Pretendard Variable',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
a{text-decoration:none;color:inherit;}
.topbar{height:60px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 28px;position:sticky;top:0;z-index:50;}
.logo{font-weight:800;font-size:17px;color:var(--blue);letter-spacing:-.5px;}
.logo span{color:var(--text);}
.logo small{display:block;font-size:11px;color:var(--text-mute);font-weight:600;margin-top:1px;}
.nav{display:flex;gap:4px;margin-left:26px;}
.nav a{font-size:15px;font-weight:600;color:var(--text-sub);padding:8px 14px;border-radius:9px;transition:.15s;}
.nav a:hover{background:var(--bg);color:var(--text);}
.nav a.active{color:var(--blue);background:var(--blue-soft);}
.top-right{margin-left:auto;display:flex;align-items:center;gap:16px;color:var(--text-mute);}
.top-right svg{width:20px;height:20px;cursor:pointer;}
.btn-up{background:var(--blue);color:#fff!important;padding:9px 16px!important;border-radius:10px;font-weight:700;}
.btn-up:hover{background:var(--blue-dark)!important;}
.wrap{max-width:1180px;margin:0 auto;padding:34px 28px 70px;}
.section-title{font-size:19px;font-weight:800;letter-spacing:-.4px;margin-bottom:18px;display:flex;align-items:center;gap:10px;}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
.filters a{font-size:14px;font-weight:600;color:var(--text-sub);background:#fff;border:1px solid var(--line);padding:9px 16px;border-radius:30px;transition:.15s;}
.filters a:hover{border-color:var(--blue);color:var(--blue);}
.filters a.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.toon-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
.toon{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);transition:transform .18s,box-shadow .18s;cursor:pointer;display:block;}
.toon:hover{transform:translateY(-5px);box-shadow:0 12px 30px rgba(0,0,0,.10);}
.toon .cover{aspect-ratio:3/4;position:relative;display:flex;align-items:flex-end;padding:16px;color:#fff;background:#15C47E;}
.toon .cover .ct{font-size:16px;font-weight:800;line-height:1.35;letter-spacing:-.4px;text-shadow:0 1px 8px rgba(0,0,0,.25);z-index:2;}
.toon .cover .cat-tag{position:absolute;top:12px;left:12px;font-size:11.5px;font-weight:700;background:rgba(255,255,255,.92);color:var(--blue-dark);padding:4px 9px;border-radius:7px;z-index:2;}
.toon .cover .new{position:absolute;top:12px;right:12px;font-size:11px;font-weight:800;background:#F04452;color:#fff;padding:3px 7px;border-radius:6px;z-index:2;}
.toon .cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;}
.toon .cover::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 35%,rgba(0,0,0,.45));z-index:1;}
.toon .info{padding:13px 15px 15px;}
.toon .info .meta{font-size:12.5px;color:var(--text-mute);display:flex;justify-content:space-between;gap:10px;}
.toon .info .meta b{color:var(--text-sub);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.state{text-align:center;padding:64px 0;color:var(--text-mute);font-size:15px;}
.state b{display:block;color:var(--text-sub);font-size:16px;margin-bottom:8px;}
.state a{color:var(--blue);font-weight:700;}
.spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--blue);border-radius:50%;margin:0 auto 16px;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.viewer-bar{background:#fff;border-bottom:1px solid var(--line);padding:18px 28px;position:sticky;top:60px;z-index:40;}
.viewer-bar .vt{font-size:18px;font-weight:800;letter-spacing:-.4px;}
.viewer-bar .vm{font-size:13px;color:var(--text-mute);margin-top:4px;}
.strip{max-width:680px;margin:0 auto;padding:30px 16px 40px;display:flex;flex-direction:column;}
.panel{width:100%;background:#fff;}
.panel img{width:100%;display:block;}
.viewer-end{text-align:center;padding:30px 0 80px;}
.viewer-end p{font-size:15px;color:var(--text-sub);margin-bottom:16px;}
.back-btn{display:inline-flex;background:var(--blue);color:#fff;padding:12px 18px;border-radius:12px;font-weight:700;font-size:14px;}
@media(max-width:980px){
  .toon-grid{grid-template-columns:repeat(2,1fr);}
  .nav{display:none;}
}
@media(max-width:560px){
  .topbar{padding:0 16px;}
  .btn-up{display:none;}
  .wrap{padding:28px 16px 60px;}
  .toon-grid{grid-template-columns:1fr;gap:16px;}
}
</style>
</head>
<body>
<header class="topbar" id="topbar"></header>

<div class="viewer-bar">
  <div class="vt" id="vTitle">불러오는 중…</div>
  <div class="vm" id="vMeta"></div>
</div>
<div class="strip" id="strip">
  <div class="state"><div class="spinner"></div>불러오는 중…</div>
</div>
<div class="viewer-end">
  <p>끝까지 읽어주셔서 감사합니다.</p>
  <a href="list.html" class="back-btn">목록으로 돌아가기</a>
</div>

<script>

const CONFIG = {
  CLOUD_NAME: 'dq3uhnrdc',
  UPLOAD_PRESET: 'hypo_webtoon',
  API_URL: 'https://script.google.com/macros/s/AKfycbywOFnBjhrfnwHwVaUcqXHzE12ucrXAs9GgZmEoYa3TUSAkzJUSa9JoWieFcw3zYuAcWw/exec',
  UPLOAD_PASSWORD: 'hypo-hr'
};

const CATEGORIES = [
  {id:'all',     label:'전체 웹툰'},
  {id:'hr',      label:'인사·제도'},
  {id:'edu',     label:'법정의무교육'},
  {id:'sec',     label:'보안·정보보호'},
  {id:'safe',    label:'안전·보건'},
  {id:'culture', label:'사내 문화'},
];
const CAT_LABEL = Object.fromEntries(CATEGORIES.map(c=>[c.id,c.label]));
const PALETTE = ['#3182F6','#7C5CFC','#15C47E','#FF6B6B','#FF922B','#22B8CF','#F783AC','#4C6EF5','#20C997','#9775FA'];

function escapeHTML(v){
  return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function colorFor(id){
  let h=0; for(const ch of String(id || '')) h=(h*31+ch.charCodeAt(0))>>>0;
  return PALETTE[h % PALETTE.length];
}

function renderHeader(active){
  const ic = {
    bell:'<path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"/>',
    search:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>',
  };
  const link = (href,label,key)=>`<a href="${href}" class="${active===key?'active':''}">${label}</a>`;
  document.getElementById('topbar').innerHTML = `
    <a href="index.html" class="logo">HYPO<span>WEBTOON</span><small>사내 인사·교육 웹툰</small></a>
    <nav class="nav">
      ${link('index.html','홈','home')}
      ${link('list.html','전체 웹툰','list')}
      ${link('upload.html','업로드','upload')}
      ${link('org.html','조직도','org')}
    </nav>
    <div class="top-right">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${ic.search}</svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${ic.bell}</svg>
      <a href="upload.html" class="btn-up">+ 웹툰 올리기</a>
    </div>`;
}

function getValue(obj, keys){
  if(!obj || typeof obj !== 'object') return '';
  for(const key of keys){
    if(obj[key] !== undefined && obj[key] !== null && String(obj[key]).trim() !== '') return obj[key];
  }
  const lowerMap = Object.fromEntries(Object.keys(obj).map(k => [k.toLowerCase().replace(/\s/g,''), k]));
  for(const key of keys){
    const found = lowerMap[String(key).toLowerCase().replace(/\s/g,'')];
    if(found && obj[found] !== undefined && obj[found] !== null && String(obj[found]).trim() !== '') return obj[found];
  }
  return '';
}

function extractUrls(value){
  if(!value) return [];
  if(Array.isArray(value)) return value.flatMap(extractUrls);
  if(typeof value === 'object') return Object.values(value).flatMap(extractUrls);
  const str = String(value);
  const matches = str.match(/https?:\/\/[^\s,"'<>|]+/g) || [];
  return matches.map(v => v.trim()).filter(Boolean);
}

function toList(value){
  if(!value) return [];
  if(Array.isArray(value)) return value.flatMap(toList).filter(Boolean);
  if(typeof value === 'object') return Object.values(value).flatMap(toList).filter(Boolean);
  const str = String(value).trim();
  if(!str) return [];
  const urls = extractUrls(str);
  if(urls.length) return urls;
  return str.split(/\n|\||,/).map(v=>v.trim()).filter(v=>v && v !== 'undefined' && v !== 'null');
}

function normalizeCategory(value){
  const v = String(value || '').trim();
  if(!v) return 'hr';
  if(['hr','edu','sec','safe','culture'].includes(v)) return v;
  if(v.includes('인사') || v.includes('제도')) return 'hr';
  if(v.includes('법정') || v.includes('의무') || v.includes('교육')) return 'edu';
  if(v.includes('보안') || v.includes('정보')) return 'sec';
  if(v.includes('안전') || v.includes('보건')) return 'safe';
  if(v.includes('문화') || v.includes('사내')) return 'culture';
  return 'hr';
}

function stableHash(text){
  let h=0; for(const ch of String(text || '')) h=(h*31+ch.charCodeAt(0))>>>0;
  return h.toString(36);
}

function normalizeWebtoon(raw, index){
  let obj = raw || {};

  if(Array.isArray(raw)){
    const urls = extractUrls(raw);
    const textCandidates = raw
      .map(v => String(v ?? '').trim())
      .filter(v => v && !v.startsWith('http') && v !== 'undefined' && v !== 'null');
    obj = {
      id: textCandidates[0] || `row-${index}`,
      title: textCandidates[1] || textCandidates[0] || '',
      cat: textCandidates.find(v => ['hr','edu','sec','safe','culture'].includes(v) || v.includes('인사') || v.includes('교육') || v.includes('보안') || v.includes('안전') || v.includes('문화')) || 'hr',
      dept: textCandidates.find(v => v.includes('파트')) || '',
      cover: urls[0] || '',
      panels: urls,
      date: textCandidates.find(v => /\d{4}[-./]\d{1,2}[-./]\d{1,2}/.test(v)) || '',
      views: 0
    };
  }

  const title = String(getValue(obj, ['title','Title','제목','웹툰명','name','Name']) || '').trim();
  const panelValue = getValue(obj, ['panels','panel','images','imageUrls','urls','files','컷','이미지','패널','웹툰이미지']);
  let panels = toList(panelValue);
  let cover = String(getValue(obj, ['cover','coverUrl','thumbnail','thumb','표지','표지이미지','coverImage','image','url']) || '').trim();
  if(!cover && panels.length) cover = panels[0];
  if(!panels.length && cover) panels = [cover];

  const cleanTitle = title && title !== 'undefined' && title !== 'null' ? title : '';
  const idSource = String(getValue(obj, ['id','ID','uid','key','번호','No']) || '').trim();
  const id = idSource && idSource !== 'undefined' && idSource !== 'null'
    ? idSource
    : `toon-${index}-${stableHash(cleanTitle + cover)}`;

  return {
    id,
    title: cleanTitle,
    cat: normalizeCategory(getValue(obj, ['cat','category','카테고리','분류'])),
    dept: String(getValue(obj, ['dept','department','담당 파트','담당파트','부서','파트']) || '').trim(),
    desc: String(getValue(obj, ['desc','description','설명','내용']) || '').trim(),
    cover,
    panels,
    date: String(getValue(obj, ['date','createdAt','created','등록일','날짜']) || '').trim(),
    views: Number(getValue(obj, ['views','view','조회','조회수']) || 0) || 0
  };
}

async function fetchWebtoons(){
  const res = await fetch(CONFIG.API_URL + '?t=' + Date.now(), { cache:'no-store' });
  const data = await res.json();
  const source = Array.isArray(data) ? data : (Array.isArray(data.items) ? data.items : (Array.isArray(data.data) ? data.data : []));
  const week = 7*24*60*60*1000;

  return source.map(normalizeWebtoon)
    .filter(w => w.title && w.panels.length)
    .map(w => {
      const ts = w.date ? new Date(w.date).getTime() : 0;
      w.isNew = ts && (Date.now() - ts) <= week;
      return w;
    });
}



async function increaseView(id){
  if(!id) return;
  try{
    const url = CONFIG.API_URL
      + '?action=view'
      + '&id=' + encodeURIComponent(String(id))
      + '&t=' + Date.now();

    // body를 쓰면 Apps Script에서 일반 등록으로 오인될 수 있어,
    // 조회수 증가는 query parameter 방식으로만 보냅니다.
    await fetch(url, {
      method: 'POST',
      mode: 'no-cors'
    });
  }catch(err){
    console.warn('조회수 업데이트 실패:', err);
  }
}

function toonCard(w){
  const coverInner = w.cover ? `<img src="${escapeHTML(w.cover)}" alt="">` : '';
  return `
  <a class="toon" href="viewer.html?id=${encodeURIComponent(w.id)}">
    <div class="cover" style="background:${w.cover ? '#222' : colorFor(w.id)};">
      ${coverInner}
      <span class="cat-tag">${escapeHTML(CAT_LABEL[w.cat] || w.cat || '')}</span>
      ${w.isNew ? '<span class="new">NEW</span>' : ''}
      <div class="ct">${escapeHTML(w.title)}</div>
    </div>
    <div class="info">
      <div class="meta"><b>${escapeHTML(w.dept || '')}</b><span>조회 ${w.views}</span></div>
    </div>
  </a>`;
}


renderHeader('list');
const id = new URLSearchParams(location.search).get('id');

(async()=>{
  const strip = document.getElementById('strip');
  try{
    const webtoons = await fetchWebtoons();
    const w = webtoons.find(item => String(item.id) === String(id));
    if(!w){
      document.getElementById('vTitle').textContent = '웹툰을 찾을 수 없어요';
      document.getElementById('vMeta').textContent = '';
      strip.innerHTML = '<div class="state"><a href="list.html">목록으로 돌아가기 ›</a></div>';
      return;
    }

    document.title = 'HYPO WEBTOON · ' + w.title;
    document.getElementById('vTitle').textContent = w.title;

    // 조회수는 Apps Script에 증가 요청을 보내고, 화면에는 즉시 +1로 표시합니다.
    const nextViews = (Number(w.views) || 0) + 1;
    document.getElementById('vMeta').textContent =
      `${CAT_LABEL[w.cat] || w.cat || ''} · ${w.dept || ''} · ${w.date || ''} · 조회 ${nextViews}`;
    increaseView(w.id);

    if(w.panels && w.panels.length){
      strip.innerHTML = w.panels
        .map(src => `<div class="panel"><img src="${escapeHTML(src)}" alt="" loading="lazy"></div>`)
        .join('');
    }else{
      strip.innerHTML = '<div class="state"><b>등록된 이미지가 없어요</b>업로드 시 웹툰 이미지를 함께 올리면 여기에 표시돼요.</div>';
    }
  }catch(err){
    console.error(err);
    strip.innerHTML = '<div class="state"><b>불러오지 못했어요</b>Apps Script URL 또는 배포 권한을 확인해 주세요.</div>';
  }
})();
</script>
</body>
</html>
