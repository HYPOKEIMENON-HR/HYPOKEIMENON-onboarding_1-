<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYPO WEBTOON · 홈</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
/* ===== HYPOKEIMENON 사내 웹툰 - 공통 스타일 ===== */
:root{
  --blue:#3182F6;--blue-dark:#1B64DA;--blue-soft:#E8F2FF;--bg:#F2F4F6;--card:#FFFFFF;
  --line:#EAECEF;--text:#191F28;--text-sub:#4E5968;--text-mute:#8B95A1;--header-bg:#E9EEF4;
  --shadow:0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard','Pretendard Variable',-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
a{text-decoration:none;color:inherit;}

/* TOP BAR */
.topbar{height:60px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 28px;position:sticky;top:0;z-index:50;}
.logo{font-weight:800;font-size:17px;color:var(--blue);letter-spacing:-.5px;}
.logo span{color:var(--text);}
.logo small{display:block;font-size:11px;color:var(--text-mute);font-weight:600;margin-top:1px;}
.nav{display:flex;gap:4px;margin-left:26px;}
.nav a{font-size:15px;font-weight:600;color:var(--text-sub);padding:8px 14px;border-radius:9px;transition:.15s;}
.nav a:hover{background:var(--bg);color:var(--text);}
.nav a.active{color:var(--blue);background:var(--blue-soft);}
.top-right{margin-left:auto;display:flex;align-items:center;gap:16px;color:var(--text-mute);}
.top-right svg{width:20px;height:20px;cursor:pointer;}
.btn-up{background:var(--blue);color:#fff!important;padding:9px 16px!important;border-radius:10px;font-weight:700;}
.btn-up:hover{background:var(--blue-dark)!important;}

/* HERO GRID */
.hero{background:var(--header-bg);padding:36px 0 42px;}
.hero-head{max-width:1180px;margin:0 auto 26px;padding:0 28px;}
.hero-head h1{font-size:24px;font-weight:800;letter-spacing:-.6px;}
.hero-head p{font-size:14.5px;color:var(--text-sub);margin-top:6px;}
.grid{max-width:1180px;margin:0 auto;padding:0 28px;display:grid;grid-template-columns:repeat(8,1fr);gap:20px 8px;justify-items:center;}
.app{display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;width:100%;}
.app .bubble{width:60px;height:60px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(49,130,246,.10);transition:transform .18s,box-shadow .18s;}
.app .bubble svg{width:27px;height:27px;color:var(--blue);}
.app:hover .bubble{transform:translateY(-4px);box-shadow:0 10px 22px rgba(49,130,246,.22);}
.app .label{font-size:13px;color:var(--text-sub);font-weight:600;text-align:center;}

/* LAYOUT */
.wrap{max-width:1180px;margin:0 auto;padding:34px 28px 70px;}
.wrap.two{display:grid;grid-template-columns:1fr 300px;gap:28px;align-items:start;}
.section-title{font-size:19px;font-weight:800;letter-spacing:-.4px;margin-bottom:18px;display:flex;align-items:center;gap:10px;}
.section-title .more{margin-left:auto;font-size:13.5px;color:var(--text-mute);font-weight:600;}

/* WEBTOON CARDS */
.toon-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
.toon{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);transition:transform .18s,box-shadow .18s;cursor:pointer;display:block;}
.toon:hover{transform:translateY(-5px);box-shadow:0 12px 30px rgba(0,0,0,.10);}
.toon .cover{aspect-ratio:3/4;position:relative;display:flex;align-items:flex-end;padding:16px;color:#fff;}
.toon .cover .ct{font-size:16px;font-weight:800;line-height:1.35;letter-spacing:-.4px;text-shadow:0 1px 8px rgba(0,0,0,.25);z-index:2;}
.toon .cover .cat-tag{position:absolute;top:12px;left:12px;font-size:11.5px;font-weight:700;background:rgba(255,255,255,.92);color:var(--blue-dark);padding:4px 9px;border-radius:7px;z-index:2;}
.toon .cover .new{position:absolute;top:12px;right:12px;font-size:11px;font-weight:800;background:#F04452;color:#fff;padding:3px 7px;border-radius:6px;z-index:2;}
.toon .cover::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 35%,rgba(0,0,0,.45));z-index:1;}
.toon .info{padding:13px 15px 15px;}
.toon .info .meta{font-size:12.5px;color:var(--text-mute);display:flex;justify-content:space-between;}
.toon .info .meta b{color:var(--text-sub);font-weight:600;}

/* LIST FILTER */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
.filters a{font-size:14px;font-weight:600;color:var(--text-sub);background:#fff;border:1px solid var(--line);padding:9px 16px;border-radius:30px;transition:.15s;}
.filters a:hover{border-color:var(--blue);color:var(--blue);}
.filters a.active{background:var(--blue);color:#fff;border-color:var(--blue);}

/* SIDEBAR */
.side{display:flex;flex-direction:column;gap:20px;}
.card{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:22px;}
.card .col-title{font-size:15px;font-weight:700;margin-bottom:14px;letter-spacing:-.3px;}
.work-card .col-title{color:var(--text-mute);font-weight:600;font-size:13px;}
.work-time{font-size:40px;font-weight:800;letter-spacing:-1.5px;line-height:1;font-variant-numeric:tabular-nums;}
.work-date{font-size:13.5px;color:var(--text-mute);margin-top:8px;}
.work-status{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;padding:5px 11px;border-radius:20px;margin-top:14px;background:var(--blue-soft);color:var(--blue);}
.work-status .ds{width:7px;height:7px;border-radius:50%;background:var(--blue);}
.work-status.off{background:#F2F4F6;color:var(--text-mute);}
.work-status.off .ds{background:var(--text-mute);}
.work-hours{margin-top:14px;display:flex;justify-content:space-between;font-size:13.5px;color:var(--text-sub);border-top:1px solid var(--line);padding-top:14px;}
.work-hours b{color:var(--text);}
.rank{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);}
.rank:last-child{border-bottom:none;}
.rank .n{font-size:15px;font-weight:800;color:var(--blue);width:18px;}
.rank .rt{font-size:13.5px;font-weight:600;line-height:1.4;}
.rank .rv{margin-left:auto;font-size:12px;color:var(--text-mute);}
.qlink{display:flex;align-items:center;gap:10px;padding:11px 0;font-size:14px;font-weight:600;color:var(--text-sub);border-bottom:1px solid var(--line);}
.qlink:last-child{border-bottom:none;}
.qlink:hover{color:var(--blue);}
.qlink svg{width:18px;height:18px;color:var(--blue);}

/* STATES */
.state{text-align:center;padding:64px 0;color:var(--text-mute);font-size:15px;}
.state b{display:block;color:var(--text-sub);font-size:16px;margin-bottom:8px;}
.state a{color:var(--blue);font-weight:700;}
.spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--blue);border-radius:50%;margin:0 auto 16px;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* VIEWER */
.viewer-bar{background:#fff;border-bottom:1px solid var(--line);padding:18px 28px;position:sticky;top:60px;z-index:40;}
.viewer-bar .vt{font-size:18px;font-weight:800;letter-spacing:-.4px;}
.viewer-bar .vm{font-size:13px;color:var(--text-mute);margin-top:4px;}
.strip{max-width:680px;margin:0 auto;padding:30px 16px 40px;display:flex;flex-direction:column;}
.panel{width:100%;}
.panel img{width:100%;display:block;}
.panel-ph{aspect-ratio:4/5;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;position:relative;font-size:15px;}
.panel-ph .pn{position:absolute;top:14px;left:16px;font-size:13px;opacity:.7;}
.viewer-end{text-align:center;padding:30px 0 80px;}
.viewer-end p{font-size:15px;color:var(--text-sub);margin-bottom:16px;}

/* UPLOAD */
.form-card{max-width:680px;margin:0 auto;}
.form-card h1{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px;}
.form-card .sub{font-size:14px;color:var(--text-sub);margin-bottom:26px;}
.field{margin-bottom:20px;}
.field label{display:block;font-size:14px;font-weight:700;margin-bottom:8px;}
.field label span{color:var(--blue);}
.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-family:inherit;font-size:15px;color:var(--text);background:#fff;transition:.15s;}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft);}
.field textarea{min-height:100px;resize:vertical;}
.drop{border:2px dashed #C9D2DC;border-radius:14px;padding:38px 20px;text-align:center;color:var(--text-mute);cursor:pointer;transition:.15s;background:#FBFCFD;}
.drop:hover{border-color:var(--blue);background:#FAFCFF;color:var(--blue);}
.drop svg{width:36px;height:36px;margin-bottom:10px;color:var(--blue);}
.drop b{display:block;font-size:15px;color:var(--text);margin-bottom:4px;}
.drop small{font-size:12.5px;}
.thumbs{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
.thumb{position:relative;}
.thumb img{width:70px;height:88px;object-fit:cover;border-radius:8px;border:1px solid var(--line);display:block;}
.thumb .rm{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#191F28;color:#fff;border:none;font-size:13px;cursor:pointer;line-height:1;}
.submit{width:100%;background:var(--blue);color:#fff;border:none;padding:16px;border-radius:13px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;transition:.15s;}
.submit:hover{background:var(--blue-dark);}
.submit:disabled{background:#C9D2DC;cursor:not-allowed;}
.note{background:var(--blue-soft);color:var(--blue-dark);font-size:13px;border-radius:12px;padding:14px 16px;margin-top:20px;line-height:1.6;}
.progress{font-size:14px;color:var(--text-sub);text-align:center;margin-top:14px;font-weight:600;}

/* PASSWORD GATE */
.gate{max-width:380px;margin:80px auto;text-align:center;}
.gate .lock{width:64px;height:64px;border-radius:50%;background:var(--blue-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.gate .lock svg{width:30px;height:30px;color:var(--blue);}
.gate h1{font-size:20px;font-weight:800;margin-bottom:8px;}
.gate p{font-size:14px;color:var(--text-sub);margin-bottom:22px;}
.gate input{width:100%;border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-family:inherit;font-size:15px;text-align:center;margin-bottom:12px;}
.gate input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft);}
.gate .err{color:#F04452;font-size:13px;font-weight:600;margin-bottom:12px;min-height:18px;}

/* ORG */
.org-wrap{max-width:920px;margin:0 auto;}
.org-top{display:flex;justify-content:center;margin-bottom:8px;}
.org-node{background:#fff;border-radius:14px;box-shadow:var(--shadow);padding:16px 26px;text-align:center;border:2px solid transparent;min-width:150px;}
.org-node .nt{font-size:16px;font-weight:800;letter-spacing:-.3px;}
.org-node .nd{font-size:12.5px;color:var(--text-mute);margin-top:3px;}
.org-node.hq{background:var(--blue);color:#fff;}
.org-node.hq .nd{color:rgba(255,255,255,.8);}
.org-node.team{border-color:var(--blue);}
.org-node.team .nt{color:var(--blue-dark);font-size:15px;}
.connector{width:2px;height:26px;background:#C9D2DC;margin:0 auto;}
.org-row{display:flex;gap:30px;justify-content:center;align-items:flex-start;flex-wrap:wrap;}
.branch{display:flex;flex-direction:column;align-items:center;}
.parts{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
.part{background:#fff;border-radius:11px;box-shadow:var(--shadow);padding:13px 18px;font-size:14px;font-weight:600;color:var(--text-sub);text-align:center;border-left:3px solid var(--blue);}

@media(max-width:980px){
  .grid{grid-template-columns:repeat(4,1fr);}
  .toon-grid{grid-template-columns:repeat(2,1fr);}
  .wrap.two{grid-template-columns:1fr;}
  .nav{display:none;}
}

</style>
</head>
<body>

<header class="topbar" id="topbar"></header>

<section class="hero">
  <div class="hero-head">
    <h1>사내 인사·교육 웹툰 📚</h1>
    <p>HYPOKEIMENON 임직원을 위한 인사 안내와 교육 콘텐츠를 웹툰으로 만나보세요.</p>
  </div>
  <div class="grid" id="homeGrid"></div>
</section>

<div class="wrap two">
  <main>
    <div class="section-title">🆕 최근 올라온 웹툰 <a href="list.html" class="more">전체보기 ›</a></div>
    <div class="toon-grid" id="recentGrid"></div>
    <div id="recentState"></div>

    <div class="section-title" style="margin-top:42px">🔥 많이 본 웹툰</div>
    <div class="toon-grid" id="popularGrid"></div>
  </main>

  <aside class="side">
    <div class="card work-card" id="workClock">
      <div class="col-title">근무 현황</div>
      <div class="work-time">--:--:--</div>
      <div class="work-date">-</div>
      <div class="work-status off"><span class="ds"></span>-</div>
      <div class="work-hours"><span>근무시간</span><b>10:00 ~ 19:00</b></div>
    </div>

    <div class="card">
      <div class="col-title">조회수 TOP 5</div>
      <div id="rankList"><div style="color:var(--text-mute);font-size:13.5px">불러오는 중…</div></div>
    </div>

    <div class="card">
      <div class="col-title">바로가기</div>
      <a class="qlink" href="upload.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 9l5-5 5 5M12 4v12"/></svg>웹툰 업로드하기</a>
      <a class="qlink" href="list.html?cat=edu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10 12 5 2 10l10 5 10-5z"/></svg>법정의무교육 모아보기</a>
      <a class="qlink" href="org.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="3" width="6" height="5" rx="1"/><rect x="3" y="16" width="6" height="5" rx="1"/><rect x="15" y="16" width="6" height="5" rx="1"/></svg>조직도 보기</a>
    </div>
  </aside>
</div>

<script>
/* ===== HYPOKEIMENON 사내 웹툰 - 공통 데이터 & 스크립트 ===== */

/* =========================================================
   ⚙️ 설정값 — 바꾸려면 이 부분만 수정하세요
   ========================================================= */
const CONFIG = {
  CLOUD_NAME:    'dq3uhnrdc',                 // Cloudinary Cloud name
  UPLOAD_PRESET: 'hypo_webtoon',              // Cloudinary Unsigned 업로드 프리셋
  API_URL:       'https://script.google.com/macros/s/AKfycbwL9WsKFLtgj50V9NzzvLZjwb_QfyZ3rkD8HPDRit8_TFXDgIReT9Y9eOsaEAvRfswo2A/exec',
  // 🔒 인사파트 업로드 비밀번호 — 아래 글자를 원하는 값으로 바꿔서 인사파트원에게만 공유하세요
  UPLOAD_PASSWORD: 'hypo-hr'
};

/* 카테고리 */
const CATEGORIES = [
  {id:'all',     label:'전체 웹툰'},
  {id:'hr',      label:'인사·제도'},
  {id:'edu',     label:'법정의무교육'},
  {id:'sec',     label:'보안·정보보호'},
  {id:'safe',    label:'안전·보건'},
  {id:'culture', label:'사내 문화'},
];
const CAT_LABEL = Object.fromEntries(CATEGORIES.map(c=>[c.id,c.label]));

/* 표지 색상 (업로드한 웹툰에 표지 이미지가 없을 때 배경색) */
const PALETTE = ['#3182F6','#7C5CFC','#15C47E','#FF6B6B','#FF922B','#22B8CF','#F783AC','#4C6EF5','#20C997','#9775FA'];
function colorFor(id){
  let h=0; for(const ch of String(id)) h=(h*31+ch.charCodeAt(0))>>>0;
  return PALETTE[h % PALETTE.length];
}

/* 웹툰 목록 (구글 시트에서 불러옴) */
let WEBTOONS = [];
async function fetchWebtoons(){
  const res = await fetch(CONFIG.API_URL);
  const data = await res.json();
  const week = 7*24*60*60*1000;
  WEBTOONS = (Array.isArray(data)?data:[]).map(w=>{
    w.views = Number(w.views)||0;
    w.panels = Array.isArray(w.panels) ? w.panels : [];
    w.isNew = w.date ? (Date.now()-new Date(w.date).getTime()) <= week : false;
    return w;
  });
  return WEBTOONS;
}
function getWebtoon(id){ return WEBTOONS.find(w=>w.id===id); }

/* 이미지 → Cloudinary 업로드 (URL 반환) */
async function uploadImage(file){
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CONFIG.UPLOAD_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CONFIG.CLOUD_NAME}/image/upload`, {method:'POST', body:fd});
  const data = await res.json();
  if(!data.secure_url) throw new Error('이미지 업로드 실패');
  return data.secure_url;
}

/* 웹툰 1개 저장 (구글 시트에 기록) */
async function saveWebtoon(record){
  await fetch(CONFIG.API_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'}, // CORS 프리플라이트 회피
    body: JSON.stringify(record)
  });
}

/* ===== 공통 헤더 ===== */
function renderHeader(active){
  const ic = {
    bell:'<path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"/>',
    search:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>',
  };
  const link = (href,label,key)=>`<a href="${href}" class="${active===key?'active':''}">${label}</a>`;
  document.getElementById('topbar').innerHTML = `
    <a href="index.html" class="logo">HYPO<span>WEBTOON</span><small>사내 인사·교육 웹툰</small></a>
    <nav class="nav">
      ${link('index.html','홈','home')}
      ${link('list.html','전체 웹툰','list')}
      ${link('upload.html','업로드','upload')}
      ${link('org.html','조직도','org')}
    </nav>
    <div class="top-right">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${ic.search}</svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${ic.bell}</svg>
      <a href="upload.html" class="btn-up">+ 웹툰 올리기</a>
    </div>`;
}

/* ===== 홈 앱 그리드 ===== */
function renderHomeGrid(){
  const I = {
    all:'<rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>',
    hr:'<circle cx="12" cy="8" r="3.2"/><path d="M5.5 20a6.5 6.5 0 0 1 13 0"/>',
    edu:'<path d="M22 10 12 5 2 10l10 5 10-5z"/><path d="M6 12v5c0 1 2.7 2.5 6 2.5s6-1.5 6-2.5v-5"/>',
    sec:'<path d="M12 2 4 5v6c0 5 3.5 8.5 8 11 4.5-2.5 8-6 8-11V5z"/><path d="M9 12l2 2 4-4"/>',
    safe:'<path d="M12 2a7 7 0 0 0-7 7c0 2 1 3.5 1 5h12c0-1.5 1-3 1-5a7 7 0 0 0-7-7z"/><path d="M9 18h6M10 21h4"/>',
    culture:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
    upload:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 9l5-5 5 5M12 4v12"/>',
    org:'<rect x="9" y="3" width="6" height="5" rx="1"/><rect x="3" y="16" width="6" height="5" rx="1"/><rect x="15" y="16" width="6" height="5" rx="1"/><path d="M12 8v4M6 16v-2h12v2"/>',
  };
  const items = [
    {key:'all',     label:'전체 웹툰',    href:'list.html?cat=all'},
    {key:'hr',      label:'인사·제도',    href:'list.html?cat=hr'},
    {key:'edu',     label:'법정의무교육', href:'list.html?cat=edu'},
    {key:'sec',     label:'보안·정보보호',href:'list.html?cat=sec'},
    {key:'safe',    label:'안전·보건',    href:'list.html?cat=safe'},
    {key:'culture', label:'사내 문화',    href:'list.html?cat=culture'},
    {key:'upload',  label:'웹툰 업로드',  href:'upload.html'},
    {key:'org',     label:'조직도',       href:'org.html'},
  ];
  const svg = p=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
  const el = document.getElementById('homeGrid');
  if(el) el.innerHTML = items.map(it=>`
    <a class="app" href="${it.href}">
      <div class="bubble">${svg(I[it.key])}</div>
      <div class="label">${it.label}</div>
    </a>`).join('');
}

/* ===== 웹툰 카드 ===== */
function toonCard(w){
  const bg = w.cover ? '#222' : colorFor(w.id);
  const coverInner = w.cover
    ? `<img src="${w.cover}" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">`
    : '';
  return `
  <a class="toon" href="viewer.html?id=${w.id}">
    <div class="cover" style="background:${bg}">
      ${coverInner}
      <span class="cat-tag">${CAT_LABEL[w.cat]||w.cat||''}</span>
      ${w.isNew?'<span class="new">NEW</span>':''}
      <div class="ct">${w.title}</div>
    </div>
    <div class="info">
      <div class="meta"><b>${w.dept||''}</b><span>조회 ${w.views}</span></div>
    </div>
  </a>`;
}

/* ===== 근무 시계 (10:00 ~ 19:00) ===== */
function startWorkClock(){
  const el = document.getElementById('workClock');
  if(!el) return;
  function tick(){
    const now = new Date();
    const days = ['일','월','화','수','목','금','토'];
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const ss = String(now.getSeconds()).padStart(2,'0');
    const h = now.getHours();
    let status, cls;
    if(h < 10){ status='출근 전'; cls='off'; }
    else if(h < 19){ status='근무 중'; cls=''; }
    else { status='업무 종료'; cls='off'; }
    el.querySelector('.work-time').textContent = `${hh}:${mm}:${ss}`;
    el.querySelector('.work-date').textContent = `${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
    const st = el.querySelector('.work-status');
    st.className = 'work-status '+cls;
    st.innerHTML = `<span class="ds"></span>${status}`;
  }
  tick(); setInterval(tick,1000);
}

</script>
<script>
  renderHeader('home');
  renderHomeGrid();
  startWorkClock();

  (async()=>{
    try{
      await fetchWebtoons();
      if(WEBTOONS.length===0){
        document.getElementById('recentState').innerHTML =
          '<div class="state"><b>아직 등록된 웹툰이 없어요</b>인사파트에서 첫 웹툰을 올리면 여기에 표시돼요. <a href="upload.html">웹툰 올리기 ›</a></div>';
        document.getElementById('rankList').innerHTML = '<div style="color:var(--text-mute);font-size:13.5px">데이터 없음</div>';
        return;
      }
      const byViews = [...WEBTOONS].sort((a,b)=>b.views-a.views);
      document.getElementById('recentGrid').innerHTML  = WEBTOONS.slice(0,8).map(toonCard).join('');
      document.getElementById('popularGrid').innerHTML = byViews.slice(0,4).map(toonCard).join('');
      document.getElementById('rankList').innerHTML = byViews.slice(0,5).map((w,i)=>`
        <a class="rank" href="viewer.html?id=${w.id}">
          <span class="n">${i+1}</span><span class="rt">${w.title}</span><span class="rv">${w.views}</span>
        </a>`).join('');
    }catch(err){
      document.getElementById('recentState').innerHTML =
        '<div class="state"><b>목록을 불러오지 못했어요</b>API 연결(구글 Apps Script 배포)을 확인해 주세요.</div>';
      document.getElementById('rankList').innerHTML = '<div style="color:#F04452;font-size:13.5px">연결 오류</div>';
    }
  })();
</script>
